<!DOCTYPE html>
<html>
    <head>
        <title>PokeDex</title>
        <meta charset="UTF-8">
        <style>
            body{
                font-family: Arial, Helvetica, sans-serif;
                padding: 20px;
            }
            img{
                width: 150opx;
            }
        </style>
    </head>
    <body>
        <h1>Imformacion de Pikachu</h1>
        <div id="info">
            <p>Cargando...</p>
        </div>
        <script>
            const apiUrl = 'https://pokeapi.co/api/v2/pokemon/pikachu';

            fetch(apiUrl)
            .then(response => {
                if(!response.ok) throw new Error("Error al obtener los datos");
                return response.json();
            })
            .then(data => {
                const infoDiv = document.getElementById('info');
                const nombre = data.name;
                const id = data.id;
                const altura = data.height;
                const peso = data.weight;
                const imagen = data.sprites.front_default;
                const tipos = data.types.map(t => t.type.name).join(', ');

            infoDiv.innerHTML = `
                <p><strong>ID:</strong> ${id}</p>
                <p><strong>Nombre:</strong> ${nombre}</p>
                <p><strong>Altura:</strong> ${altura*10}</p>
                <p><strong>Peso:</strong> ${peso/10}</p>
                <p><strong>Tipo:</strong> ${tipos}</p>
                <img src="${imagen}" alt="${nombre}"/>
                `;
            })
            .catch(error => {
                document.getElementById('info').innerHTML = `<p>Error: ${error.message}</p>`;
            });

        </script>
    </body>
</html>
