<!DOCTYPE html>
<html>
    <head>
        <title>Geolocalizacion</title>
        <meta charset="UTF-8">
    </head>
    <Body>
        <button id="aumentar">+</button>
        <button id="disminuir">-</button>
        <h1 id="titulo">API de Geolocalizacion</h1>
        <button id="find-me">Encontrar mi ubicacion</button><br>
        <p id="status"></p>
        <a id="map-link" target="_blank"></a>
    </Body>
    <script>
        function geoFindMe(){
            const status = document.querySelector("#status");
            const mapLink = document.querySelector("#map-link");

            mapLink.href = "";
            mapLink.textContent = "";

            function success(position) {
                const latitude = position.coords.latitude;
                const longitude = position.coords.longitude;

                status.textContent = "";

                mapLink.href = `https://www.openstreetmap.org/#map=19/${latitude}/${longitude}`;
                mapLink.textContent = `Latitude: ${latitude}°, Longitude: ${longitude}°`;
            }

            function error(){
                status.textContent = "Unable"
            }

            if (!navigator.geolocation){
                status.textContent = "Geolocation is not supported by your browser";
            } else{
                status.textContent = "Locating...";
                navigator.geolocation.getCurrentPosition(success, error);
            }
        }        

        document.querySelector("#find-me").addEventListener("click", geoFindMe);

/*
            function error(err) {
                console.log(err);
                status.textContent = `Código: ${err.code} - ${err.message}`;
            }
*/

    </script>
</html>
