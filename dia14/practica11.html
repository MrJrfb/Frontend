<!DOCTYPE html>
<html>
    <head>
        <title>Practica 11</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <script>
            let secreto = Math.floor(Math.random()*10) + 1;
            let intento;
            do{
                intento = parseInt(prompt("Adivina un numero del 1 al 10 "));
            }while(secreto !== intento);
            console.log("Correcto!");
        </script>
    </body>
</html>
