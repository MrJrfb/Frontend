<!DOCTYPE html>
<html>
    <head>
        <title>Practicas de Javascript</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <script>
            let numero = parseInt(prompt("Introduce un numero: "));
            for (let i = 1; i <= 10; i++) {
                document.write(`<br> ${numero} x ${i} = ${numero * i}`);
            }
        </script>
    </body>
</html>
