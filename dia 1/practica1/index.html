<!DOCTYPE html> <!--Indica al navegador que el documento utiliza HTML5.-->
<html>
  <head> <!--Contiene información sobre la página que normalmente no se muestra al usuario.-->
    <title>Mi primera web</title> <!-- Título que aparece en la pestaña del navegador -->
    <meta charset="UTF-8"/> <!--Caracteres-->
    <link rel="stylesheet" href="style.css"/> <!-- Vincula el archivo CSS para dar estilos a la página -->
  </head>
  <body> <!-- Inicio del contenido visible de la página -->
    <h1>Tu tienda de software de confianza </h1> <!-- Título principal de la página -->
        <ul> <!-- Inicio de una lista no ordenada -->
            <li>Juegos</li>  <!-- Elemento de la lista -->
            <li>ERP y CRM</li>
            <li>Facturación</li>
            <li>Logistica</li>
            <li>GPS</li>
        </ul>
        <hr> <!-- Inserta una línea horizontal de separación -->
        <img src="images/juego.png" class="card" id="img1"/> <!--ruta de la imagen, asigna la clase CSS llamada card, identificador único de la imagen-->
        <img src="images/erp_crm.png" class="card" id="img2"/>
        <img src="images/facturacion.jpg" class="card" id="img3"/>
        <img src="images/logistica.png" class="card" id="img4"/>
        <img src="images/gps.jpg" class="card" id="img5     "/>
  </body> <!-- Vincula el archivo JavaScript para agregar funcionalidad -->

  <script src="script.js"></script>
</html>
