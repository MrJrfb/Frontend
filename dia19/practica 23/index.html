<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Buscador de Peliculas y Series - TMDB</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="estilos.css">  
    </head>
    <body>
        <div class="container py-5">

        
            <div class="text-center mb-4">
                <h1 class="titulpo-app">Buscador de Peliculas y Series</h1>
                <p class="text-muted">Consumo de la API de TMDB con jQuery</p>
            </div>
            
            <div class="row justify-content-center mb-4">
                <div class="col-md-8 col-lg-6">
                    <div class="input-group input-group-lg">
                        <input type="text" id="txtBusqueda" class="form-control"
                                placeholder="Escribe el nombre de una pelicula o serie...">
                        <button id="btnBuscar" class="btn btn-primary">Buscar</button>
                    </div>
                </div>
            </div>
            <div id="mensaje" class="text-center text-muted mb-4"></div>
            <div id="resultados" class="row g-4"></div>
        </div>
        <script src="https://code.jquery.com/jquery-4.0.0.js"
                integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
                crossorigin="anonymous"></script>
        <script src="script.js"></script>
    </body>
</html>
