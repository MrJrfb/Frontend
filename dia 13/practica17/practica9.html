<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Practicas de Javascript</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <script>
            let suma = 0;
            for (let i=1; i<100; i++){
                suma += i;
            }
            console.log(`La suma es ${suma}`);
            document.write(suma);
        </script>
    </body>
</html>
