<!DOCTYPE html>
<html>
    <head>
        <title>Practica 15</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <script>
            let numeros = [1,2,3,4,5,6];
            let contador = 0;
            for (let num of numeros){
                if (num % 2 === 0){
                    contador ++;
                }
            }
            document.write(contador);
        </script>
    </body>
</html>
