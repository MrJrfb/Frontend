<!DOCTYPE html>
<html>
    <head>
        <title>Libreria Math</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <script>
            function mayor(a,b,c){
                return Math.max(a,b,c);
            }
            function raizCuadrada(a){
                return Math.sqrt(a)
            }
            document.write("Mayor: " + mayor(3,6,2));
            document.write("<br>Raiz cuadrada: " + raizCuadrada(25));
        </script>
    </body>
</html>
