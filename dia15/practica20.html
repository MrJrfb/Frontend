<!DOCTYPE html>
<html>
    <head>
        <title>Practica 19</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <script>
            let i = 0;
            let intervalo = setInterval(()=> {
                document.write(i);
                i++;
                if (i>10) clearInterval(intervalo);
            },1000);
        </script>
    </body>
</html>
