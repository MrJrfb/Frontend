<!DOCTYPE html>
<html>
    <head>
        <title>Venta</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style1.css">
    </head>
    <body>
        <table  id="venta">
            <tr>
                <th colspan="4">Detalle de Venta-Factura #0001</th>
            </tr>
            <tr>
                <th>Producto</th>
                <th>Cant.</th>
                <th>Precio unit.</th>
                <th>Subtotal</th>
            </tr>
            <tr>
                <td class="producto">Remera blanca</td>
                <td>2</td>
                <td>85.000</td>
                <td>170.000</td>
            </tr>
            <tr>
                <td class="producto">Mochila negra</td>
                <td>1</td>
                <td>320.000</td>
                <td>320.000</td>
            </tr>
            <tr>
                <td rowspan="2">TOTALES</td>
                <td class="derecha" colspan="2">IVA(10%)</td>
                <td>49.000</td>
            </tr>
            <tr>
                <td class="derecha" colspan="2">TOTAL</td>
                <td>539.000</td>
            </tr>
        </table>
    </body>
</html>
